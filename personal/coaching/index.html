<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaching Dashboard</title>
  <meta name="description" content="Manage your coaching clients and sessions">
  <link rel="stylesheet" href="/styles/output.css">
  
</head>
<body class="min-h-screen">
  
<div class="min-h-screen bg-base-200">
  <!-- Header -->
  <div class="navbar bg-base-100 shadow-lg">
    <div class="flex-1">
      <a href="/personal/coaching/" class="btn btn-ghost normal-case text-xl">🎯 Coaching</a>
    </div>
    <div class="flex-none gap-2">
      <span id="user-email" class="text-sm text-gray-600"></span>
      <button id="logout-btn" class="btn btn-sm btn-outline">Logout</button>
    </div>
  </div>

  <div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- Alert messages -->
    <div id="alert-container" class="mb-4"></div>

    <!-- Loading state -->
    <div id="loading" class="flex justify-center items-center py-12">
      <span class="loading loading-spinner loading-lg"></span>
    </div>

    <!-- Clients list -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">My Clients</h1>
      <button id="add-client-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Client
      </button>
    </div>

    <!-- Empty state -->
    <div id="empty-clients" class="hidden text-center py-12">
      <div class="text-6xl mb-4">🎯</div>
      <h2 class="text-2xl font-bold mb-2">No clients yet</h2>
      <p class="text-gray-600 mb-6">Add your first coaching client to get started.</p>
      <button class="btn btn-primary add-client-trigger">Add First Client</button>
    </div>

    <!-- Client cards -->
    <div id="clients-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>
</div>

<!-- ═══ ADD/EDIT CLIENT MODAL ═══ -->
<dialog id="client-modal" class="modal">
  <div class="modal-box max-w-lg">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="font-bold text-lg mb-4" id="client-modal-title">Add Client</h3>

    <input type="hidden" id="client-edit-id">

    <div class="space-y-4">
      <div class="form-control">
        <label class="label"><span class="label-text">Name *</span></label>
        <input type="text" id="client-name" class="input input-bordered" placeholder="Client name" required>
      </div>
      <div class="form-control">
        <label class="label"><span class="label-text">Email</span></label>
        <input type="email" id="client-email" class="input input-bordered" placeholder="client@email.com">
      </div>
      <div class="form-control">
        <label class="label"><span class="label-text">Phone</span></label>
        <input type="tel" id="client-phone" class="input input-bordered" placeholder="555-123-4567">
      </div>
      <div class="form-control">
        <label class="label"><span class="label-text">Notes</span></label>
        <textarea id="client-notes" class="textarea textarea-bordered h-20" placeholder="General notes about this client..."></textarea>
      </div>
    </div>

    <div class="modal-action">
      <button id="save-client-btn" class="btn btn-primary">Save Client</button>
      <form method="dialog">
        <button class="btn">Cancel</button>
      </form>
    </div>
  </div>
</dialog>

<!-- ═══ DELETE CLIENT MODAL ═══ -->
<dialog id="delete-client-modal" class="modal">
  <div class="modal-box">
    <h3 class="font-bold text-lg mb-4">Delete Client?</h3>
    <p class="mb-2">Are you sure you want to delete <strong id="delete-client-name"></strong>?</p>
    <p class="text-sm text-gray-600 mb-4">This will also delete all their session logs. This action cannot be undone.</p>
    <input type="hidden" id="delete-client-id">
    <div class="modal-action">
      <button id="confirm-delete-client" class="btn btn-error">Delete</button>
      <form method="dialog">
        <button class="btn">Cancel</button>
      </form>
    </div>
  </div>
</dialog>


<script type="module" src="/assets/js/coaching/clients.js"></script>

</body>
</html>
