<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaching Sessions</title>
  <meta name="description" content="Session log for coaching client">
  <link rel="stylesheet" href="/styles/output.css">
  
</head>
<body class="min-h-screen">
  
<div class="min-h-screen bg-base-200">
  <!-- Header -->
  <div class="navbar bg-base-100 shadow-lg">
    <div class="flex-1">
      <a href="/personal/coaching/" class="btn btn-ghost normal-case text-xl">🎯 Coaching</a>
    </div>
    <div class="flex-none gap-2">
      <span id="user-email" class="text-sm text-gray-600"></span>
      <button id="logout-btn" class="btn btn-sm btn-outline">Logout</button>
    </div>
  </div>

  <div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- Alert messages -->
    <div id="alert-container" class="mb-4"></div>

    <!-- Sessions header -->
    <div class="flex items-center gap-4 mb-6">
      <a href="/personal/coaching/" class="btn btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back
      </a>
      <div class="flex-1">
        <h1 class="text-3xl font-bold" id="session-client-name"></h1>
        <p class="text-sm text-gray-600" id="session-client-info"></p>
      </div>
      <button id="add-session-btn" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        New Session
      </button>
    </div>

    <!-- Empty sessions -->
    <div id="empty-sessions" class="hidden text-center py-12">
      <div class="text-6xl mb-4">📋</div>
      <h2 class="text-2xl font-bold mb-2">No sessions yet</h2>
      <p class="text-gray-600 mb-6">Log your first session with this client.</p>
      <button class="btn btn-primary" id="add-first-session-btn">Log First Session</button>
    </div>

    <!-- Sessions list -->
    <div id="sessions-list" class="space-y-4"></div>
  </div>
</div>

<!-- ═══ ADD/EDIT SESSION MODAL ═══ -->
<dialog id="session-modal" class="modal">
  <div class="modal-box max-w-2xl">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="font-bold text-lg mb-4" id="session-modal-title">New Session</h3>

    <input type="hidden" id="session-edit-id">

    <div class="space-y-4">
      <div class="form-control">
        <label class="label"><span class="label-text">Date & Time *</span></label>
        <input type="datetime-local" id="session-date" class="input input-bordered" required>
      </div>
      <div class="form-control">
        <label class="label"><span class="label-text">Meeting Summary *</span></label>
        <textarea id="session-summary" class="textarea textarea-bordered h-24" placeholder="What was discussed..." required></textarea>
      </div>
      <div class="form-control">
        <label class="label"><span class="label-text">My Notes</span></label>
        <textarea id="session-notes" class="textarea textarea-bordered h-20" placeholder="Private coaching notes..."></textarea>
      </div>
      <div class="form-control">
        <label class="label"><span class="label-text">Action Items (1-3)</span></label>
        <div id="action-items-container" class="space-y-2">
          <input type="text" class="input input-bordered w-full action-item-input" placeholder="Action item 1">
          <input type="text" class="input input-bordered w-full action-item-input" placeholder="Action item 2">
          <input type="text" class="input input-bordered w-full action-item-input" placeholder="Action item 3">
        </div>
      </div>
    </div>

    <div class="modal-action">
      <button id="save-session-btn" class="btn btn-primary">Save Session</button>
      <form method="dialog">
        <button class="btn">Cancel</button>
      </form>
    </div>
  </div>
</dialog>

<!-- ═══ VIEW SESSION MODAL ═══ -->
<dialog id="view-session-modal" class="modal">
  <div class="modal-box max-w-2xl">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="font-bold text-2xl mb-2" id="view-session-date-title"></h3>

    <div class="mb-6">
      <p class="text-sm text-gray-600 mb-2">Summary</p>
      <div class="p-4 bg-base-200 rounded-lg">
        <p id="view-session-summary" class="whitespace-pre-wrap"></p>
      </div>
    </div>

    <div id="view-notes-section" class="mb-6 hidden">
      <p class="text-sm text-gray-600 mb-2">My Notes</p>
      <div class="p-4 bg-base-200 rounded-lg">
        <p id="view-session-notes" class="whitespace-pre-wrap"></p>
      </div>
    </div>

    <div id="view-actions-section" class="mb-6 hidden">
      <p class="text-sm text-gray-600 mb-2">Action Items</p>
      <div id="view-action-items" class="space-y-2"></div>
    </div>

    <div class="modal-action">
      <button id="edit-session-from-view" class="btn btn-primary btn-sm">Edit</button>
      <button id="delete-session-from-view" class="btn btn-error btn-sm">Delete</button>
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

<!-- ═══ DELETE SESSION MODAL ═══ -->
<dialog id="delete-session-modal" class="modal">
  <div class="modal-box">
    <h3 class="font-bold text-lg mb-4">Delete Session?</h3>
    <p class="mb-4">Are you sure you want to delete this session log? This action cannot be undone.</p>
    <input type="hidden" id="delete-session-id">
    <div class="modal-action">
      <button id="confirm-delete-session" class="btn btn-error">Delete</button>
      <form method="dialog">
        <button class="btn">Cancel</button>
      </form>
    </div>
  </div>
</dialog>


<style>
.line-clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>

<script type="module" src="/assets/js/coaching/sessions.js"></script>

</body>
</html>
